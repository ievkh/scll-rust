# cargo-deny policy (PDD §10.6): no copyleft on the dependency graph; the
# studied reference implementations (GlobalPlatformPro LGPL, nexum AGPL) must
# never become deps. Keep deps MIT/Apache-2.0 dual.
[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause", "Unicode-3.0"]
confidence-threshold = 0.9

[bans]
deny = []

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
